<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rin AI</title>
</head>
<body>

<h1>Rin AI - X投稿生成</h1>

<button onclick="generate()">生成</button>

<pre id="out"></pre>

<script>
async function generate() {

  const prompt = `
あなたはSNSインフルエンサーAI「Rin」。
バズるX投稿を1つ作ってください。

条件：
- 140文字以内
- 絵文字あり
- 共感系
- Z世代向け
`;

  const res = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key= AIzaSyBm9Iun0UZ3BuzPZWPFY3yLUcICtk9Nsak",
    {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }]
      })
    }
  );

  const data = await res.json();

  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

  document.getElementById("out").innerText = text;
}
</script>

</body>
</html>
